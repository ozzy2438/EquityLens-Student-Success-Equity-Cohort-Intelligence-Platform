schema_version: 1

# Sheet-level extraction instructions: one rule per (source_id, sheet). Each
# DoE section spans multiple sheet-naming and row-layout eras that do NOT
# line up with each other or with a clean .xls/.xlsx split -- verified
# against the real workbooks, not assumed:
#
#   Section 11 (enrolment equity): pseudo-header single-year layout through
#   2019, switches to explicit State|Institution columns from 2020, and is
#   entirely restructured in 2024 (institution table moves from "11.3" to
#   "11.5" as national wide-year tables were inserted ahead of it).
#
#   Section 15 (attrition/retention/success): same pseudo-header ->
#   State|Institution switch, but at 2020 (matching S11). At 2023 DoE
#   swapped the position of the Retention and Success tables within the
#   section (retention moved 15.7 -> 15.4, success moved 15.4 -> 15.7) --
#   the table *number* is not a stable identity across years.
#
#   Section 16 (equity performance): keeps a single-column pseudo-header
#   layout through 2022 (bare sheet names "1a" etc., even after S11/S15 had
#   already moved to .xlsx), switches sheet naming to "16.1a" in 2023 (same
#   year the row layout also switches to explicit Group|Category columns),
#   then drops the lettered suffix entirely in 2024 ("16.1a" -> "16.1").
#
#   Section 17 (completion cohort): the pre-2023 "Completion Rates Cohort
#   Analyses" historical publications use sheet names "T1".."T12"; the 2023
#   annual release uses "17.1".."17.12" with the same grid shape; the 2024
#   annual release restructured entirely to an already-tidy per-row format
#   and consolidated three tracking windows into one sheet (see s17_2024
#   rule below). 2024's national demographic-breakdown sheets (17.1/17.2)
#   have no per-institution rows and are intentionally out of scope.
#
# New publication years are a pure data addition here as long as they reuse
# an already-modelled header_style; a structural change (like 2024's S17
# restructure) needs one new header_style + normalizer branch.

rules:
  # ============================== Section 11 ==============================
  - source_id: doe_s11_2018
    sheet: "3"
    table_number: "11.3"
    target_fact: fact_enrolment_equity
    header_style: inline_state_pseudo_header
