  # 2024 restructured to an already-tidy per-row layout consolidating all
  # three tracking windows (4/6/9 year) into one sheet; the national
  # demographic-breakdown sheets (17.1/17.2) have no per-institution rows
  # and are intentionally out of scope (see docs/schema.md).
  - source_id: doe_s17_2024
    sheet: "17.3"
    table_number: "17.3"
    target_fact: fact_completion_cohort
    header_style: s17_cohort_table
    options:
      layout_kind: tidy
      institution_col: 1
      duration_col: 2
      timeframe_col: 3
      data_start_row: 3
      metric_definition: domestic_bachelor
      is_annual_release: true
      skip_institution_labels:
        - "Table A and B Providers"
        - "Table A Providers"
        - "Table B Providers"
      metric_columns:
        - {column: 4, metric: completion_rate}
        - {column: 5, metric: still_enrolled}
        - {column: 6, metric: re_enrolled_dropped_out}
        - {column: 7, metric: never_came_back}

  # ============================== QILT SES ==============================
  # Only university-level, single-latest-year (1Y) institution sheets are in
  # scope -- NUHEI sheets list ~100 small colleges with no DoE counterpart
  # and no bearing on ACU peer benchmarking; multi-year trend sheets are a
  # different grain. See docs/schema.md.
  - source_id: qilt_ses_2024
    sheet_pattern: "FOCUS_(UG|PGC)_UNI_1Y_INST_CI"
    workbook_member: "SES_2024_National_Report_Tables.xlsx"
    target_fact: fact_ses_experience
    header_style: focus_area_columns
    options:
      header_row: 3
      institution_col: 1
      data_start_row: 4
      value_pattern: '^(?P<value>[\d.]+)\s*(?:\((?P<ci_low>[\d.]+),\s*(?P<ci_high>[\d.]+)\))?$'
      sheet_name_pattern: "FOCUS_(?P<level>UG|PGC)_(?P<provider_type>UNI)_(?P<year_scope>1Y)_INST_CI"

