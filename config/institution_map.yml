schema_version: 1

# Canonical institution identities for DoE Sections 11/15/16/17 (Table A and B
# providers) and QILT SES university-level tables. Trailing footnote markers
# such as "(f)", "(1.08)", "(1.03)" are stripped automatically by
# institution_map.normalize_name() and do NOT need to be listed as aliases
# here -- only genuinely different textual forms (typos, renames, name
# changes) need an explicit alias entry.
#
# Coverage is scoped to Table A/B universities: DoE institution-level tables
# never break out individual Non-University Higher Education Institutions
# (NUHEIs) -- they appear only as an aggregate "Non-University Higher
# Education Institutions" rollup row, handled specially by the normalizers,
# not resolved through this alias table. QILT's NUHEI-level `_INST_CI` sheets
# (dozens of small colleges with no DoE counterpart) are intentionally out of
# scope for Phase 2: fact_ses_experience only loads QILT's university-level
# sheets, since the analytical focus of this project is ACU and its
# university peer set. See docs/schema.md for the disclosed scope note.

institutions:
  - canonical_id: acu
    canonical_name: "Australian Catholic University"
    type: university
    state: multi_state
    is_multi_state: true
    peer_group_id: acu_peer_regional
    aliases: ["Australian Catholic University", "ACU"]

  - canonical_id: avondale_university
    canonical_name: "Avondale University"
    type: university
    state: nsw
    peer_group_id: acu_peer_regional
    aliases: ["Avondale University", "Avondale university", "Avondale University College"]

